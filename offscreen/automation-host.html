<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Dichrome Offscreen Host</title>
    <style>
      html,
      body {
        margin: 0;
        width: 1280px;
        height: 900px;
        overflow: hidden;
        background: transparent;
      }

      .automation-frame {
        position: absolute;
        inset: 0;
        width: 1280px;
        height: 900px;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="chatgptChatFrame" class="automation-frame" name="dichrome-offscreen-chat" title="Assistant automation chat host" src="https://chatgpt.com/" referrerpolicy="origin"></iframe>
    <iframe id="chatgptHistoryFrame" class="automation-frame" name="dichrome-offscreen-history" title="Assistant automation history host" src="https://chatgpt.com/" referrerpolicy="origin"></iframe>
    <script src="automation-host.js"></script>
  </body>
</html>
