<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dichrome</title>
    <link rel="stylesheet" href="sidepanel.css">
  </head>
  <body>
    <header class="app-header">
      <div class="brand-lockup">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1>Dichrome</h1>
      </div>
      <div class="header-actions">
        <button id="newChatButton" class="ghost-button" type="button" title="Start a separate new conversation">New</button>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh panel state">Refresh</button>
      </div>
    </header>

    <main class="chat-shell">
      <section class="history-panel" aria-label="Project conversations">
        <div class="history-toolbar">
          <div class="history-title">
            <strong>Project history</strong>
            <span id="historyStatus">Loading automatically</span>
          </div>
          <button id="historyRefreshButton" class="tiny-button" type="button">Refresh</button>
        </div>
        <div id="historyList" class="history-list hidden" aria-label="Project conversation list"></div>
      </section>

      <section id="chatMessages" class="chat-messages" aria-label="Conversation messages">
        <div class="empty-chat">
          <strong>Start a chat</strong>
          <span>Type below, attach context, or select webpage text. Follow-ups continue this conversation until you press New.</span>
        </div>
      </section>

      <section id="composerPanel" class="composer-panel" aria-label="Message composer">
        <div id="selectedContextCard" class="context-card hidden">
          <div class="context-header">
            <strong>Selected webpage text</strong>
            <button id="clearSelectedContextButton" class="tiny-button" type="button">Remove</button>
          </div>
          <div id="selectedContextPreview" class="context-preview"></div>
          <div id="quickActions" class="quick-actions" aria-label="Selected text quick actions">
            <button type="button" data-action="explain">Explain</button>
            <button type="button" data-action="summarize">Summarize</button>
            <button type="button" data-action="improve">Improve</button>
            <button type="button" data-action="rewrite">Rewrite</button>
            <button type="button" data-action="define">Define</button>
          </div>
        </div>

        <label class="composer-label" for="manualText">Message</label>
        <div id="composerDropZone" class="composer-box">
          <input id="attachmentInput" class="hidden" type="file" multiple>
          <div id="attachmentsTray" class="attachments-tray hidden" aria-label="Pending attachments"></div>
          <textarea id="manualText" rows="3" spellcheck="true" placeholder="Message Dichrome..."></textarea>
          <div class="composer-actions">
            <div class="composer-left-actions">
              <button id="composerScreenshotButton" class="icon-only-button" type="button" title="Attach screenshot">Screenshot</button>
              <button id="composerAttachButton" class="icon-only-button" type="button" title="Attach files">Files</button>
            </div>
            <div class="composer-right-actions">
              <label class="composer-model-control">
                <span class="visually-hidden">Mode</span>
                <select id="modelLabel" aria-label="Mode">
                  <option value="">Default</option>
                  <option value="Auto">Auto</option>
                  <option value="Instant">Instant</option>
                  <option value="Thinking">Thinking</option>
                  <option value="Extended">Extended</option>
                  <option value="Pro">Pro</option>
                  <option value="o3">o3</option>
                  <option value="o4">o4</option>
                </select>
              </label>
              <button id="sendManualButton" class="primary-button send-button" type="button" title="Send message" aria-label="Send message">
                <span aria-hidden="true">↑</span>
              </button>
            </div>
          </div>
        </div>
        <div id="errorBlock" class="error-block hidden"></div>
        <div class="request-actions">
          <button id="retryButton" type="button" disabled>Retry</button>
          <button id="openChatGptButton" type="button" disabled>Open ChatGPT to sign in</button>
          <button id="cancelButton" type="button" disabled>Cancel</button>
          <span id="statusLine" class="status-line">Ready</span>
        </div>
      </section>

      <div id="responseParking" class="hidden" aria-hidden="true">
        <div id="responseText" class="response-content"></div>
      </div>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
